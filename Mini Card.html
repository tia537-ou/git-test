<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini color card</title>
<style>

body{
background-color: darkviolet;
}
    h1{
        text-align: center;
        font-size: 70px;
    }
   .boxes{
    background-color: burlywood;
    border: solid;
    display: flex;
    justify-content: space-around;
    align-items: center;
    padding: 100px;
    gap: 20px;
    flex: 1;
    

   }

   .blue{
    background-color: blue;
    padding: 30px;
color: white;
font-size: larger;
   }

   .pink{
    background-color: pink;
    padding: 30px;
    color: white;
    font-size: larger;
   }

   .purple{
    background-color: purple;
    padding: 30px;
    color: white;
    font-size: larger;
   }

   .black{
    background-color: black;
    padding: 30px;
    color: white;
    font-size: larger;
   }

   .green{
background-color: green;
padding: 30px;
color: white;
font-size: larger;
   }

   .yellow{
background-color: rgb(233, 233, 0);
padding: 30px;
color: white;
font-size: larger;
   }
</style>

</head>
<body>
    
    <h1>Mini Color Boxes</h1>

<div class="boxes">
    <div class="blue">
        <h2>BLUE</h2>
    </div>

    
    <div class="pink">
        <h2>PINK</h2>
    </div>

    
    <div class="purple">
        <h2>PURPLE</h2>
    </div>

    
    <div class="black">
        <h2>BLACK</h2>
    </div>

    
    <div class="green">
        <h2>GREEN</h2>
    </div>

    
    <div class="yellow">
        <h2>YELLOW</h2>
    </div>

</div>

</body>
</html>
