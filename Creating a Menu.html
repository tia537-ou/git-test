<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creating a menu</title>
   <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cedarville+Cursive&display=swap" rel="stylesheet">
    <style>
        *{
            margin: 0;
            padding: 0;
        }

        body {
    display: flex;
    justify-content: center;
    align-items: center;
min-height: 100vh;
}
.outer{
    border: 3px solid;
    background-color: rgb(221, 212, 171);
    width: 600px;

}

.inner{
    border: 3px solid;
    margin: 20px;
    text-align: center;
   line-height: 2.5;
   background-image: url(image/FREE\ Rustic\ Baby\ Shower\ Invitations\ Templates….jpg);
}

hr{
    width: 300px;
    border: none;
    margin: 10px auto;
    border-top:2px solid black ;
}

li{
   
  font-family: "Cedarville Cursive", cursive;
  font-weight:bolder ;
  font-size: 20px;

 
}


ul{
    list-style: none;
}


    </style>
</head>
<body>
    <div class="outer">
        <div class="inner">
            <h1>Menu</h1>
            <hr>
            <ul>
  <li>Grilled Chicken Sandwich</li>
    <li>Beef Burger with Fries</li>
    <li>Margherita Pizza</li>
    <li>Caesar Salad</li>
    <li>Spaghetti Bolognese</li>
    <li>BBQ Ribs Platter</li>
    <li>Shrimp Tacos</li>
    <li>Vegetable Stir Fry</li>
    <li>Mushroom Risotto</li>
    <li>Chocolate Lava Cake</li>
            </ul>
            <em>by Davia</em>
        </div>
    </div>
    
</body>
</html>
